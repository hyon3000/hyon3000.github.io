<!doctype html><html><body>
<canvas id="c" width="120" height="120"></canvas>
<script>
var params = new URLSearchParams(location.search);
var cnt = parseInt(params.get('r') || '7', 10);
var rv = {6:207,7:206,8:205,9:203,10:202,11:201,12:199,13:198,14:197};
var val = rv[cnt] || (158 + cnt);
var ctx = document.getElementById('c').getContext('2d');
ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 120, 120);
var s = cnt * 54321 + 13579;
function sr() { s = (s * 1103515245 + 12345) & 0x7fffffff; return s; }
var g = []; for (var i = 0; i < 9; i++) { g[i] = []; for (var j = 0; j < 9; j++) g[i][j] = 0; }
var rr = 4, cc = 4, n = 0;
while (n < cnt) { if (g[rr][cc] === 0) { g[rr][cc] = 1; n++; } var d = sr() % 4; if (d === 0) rr = Math.min(8, rr + 1); else if (d === 1) rr = Math.max(0, rr - 1); else if (d === 2) cc = Math.min(8, cc + 1); else cc = Math.max(0, cc - 1); }
var cells = [], r1 = 99, r2 = -99, c1 = 99, c2 = -99;
for (var r = 0; r < 9; r++) for (var c = 0; c < 9; c++) if (g[r][c]) { cells.push([r, c]); r1 = Math.min(r1, r); r2 = Math.max(r2, r); c1 = Math.min(c1, c); c2 = Math.max(c2, c); }
var bw = c2 - c1 + 1, bh = r2 - r1 + 1, cs = Math.floor(100 / Math.max(bw, bh)), ox = (120 - bw * cs) / 2, oy = (120 - bh * cs) / 2;
var pic = (val & 127) ^ 64, R = pic >> 4, G = (pic >> 2) & 3, B = pic & 3;
var cr = Math.round((R + .6) / 4.8 * 255), cg = Math.round((G + .8) / 4.4 * 255), cb = Math.round((B + .8) / 4.4 * 255);
if ((val & 255) > 127) { cr = Math.min(255, Math.floor(cr * 0.7 + 30)); cg = Math.floor(cg * 0.6); cb = Math.floor(cb * 0.6); }
for (var k = 0; k < cells.length; k++) { var x = ox + (cells[k][1] - c1) * cs, y = oy + (cells[k][0] - r1) * cs; ctx.fillStyle = 'rgb(' + cr + ',' + cg + ',' + cb + ')'; ctx.fillRect(x, y, cs, cs); var m = cs * .13; ctx.fillStyle = 'rgb(' + Math.min(255, Math.round(cr * 1.2)) + ',' + Math.min(255, Math.round(cg * 1.2)) + ',' + Math.min(255, Math.round(cb * 1.2)) + ')'; ctx.fillRect(x + m, y + m, cs - m * 2, cs - m * 2); ctx.strokeStyle = 'rgba(0,0,0,.3)'; ctx.lineWidth = 1; ctx.strokeRect(x, y, cs, cs); }
</script></body></html>
