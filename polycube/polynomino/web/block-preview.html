    ctx.fillStyle='rgb('+cr+','+cg+','+cb+')';
    ctx.fillRect(x,y,cs,cs);
    const m=cs*0.13;
    ctx.fillStyle='rgb('+Math.min(255,Math.round(cr*1.2))+','+Math.min(255,Math.round(cg*1.2))+','+Math.min(255,Math.round(cb*1.2))+')';
    ctx.fillRect(x+m,y+m,cs-m*2,cs-m*2);
    // Grid outline
    ctx.strokeStyle='rgba(0,0,0,0.3)';
    ctx.lineWidth=1;
    ctx.strokeRect(x,y,cs,cs);
  }
}
// Random block mode: ?r=CNT generates a random polyomino with CNT cells
const rndCnt = parseInt(params.get('r') || '0', 10);
if (rndCnt > 0) {
  // Seeded RNG for reproducibility (seed = cell count)
  let _seed = rndCnt * 12345 + 67890;
  function srand() { _seed = (_seed * 1103515245 + 12345) & 0x7fffffff; return _seed; }
  const grid = [];
  for (let i = 0; i < 7; i++) { grid[i] = []; for (let j = 0; j < 7; j++) grid[i][j] = 0; }
  let rr = 3, cc = 3, cnt = 0;
  const _rv3={6:207,7:206,8:205,9:203,10:202,11:201,12:199,13:198,14:197}; const val = _rv3[rndCnt] || (158+rndCnt);
  while (cnt < rndCnt) {
    if (grid[rr][cc] === 0) { grid[rr][cc] = val; cnt++; }
    switch (srand() % 4) {
      case 0: rr = Math.min(6, rr + 1); break;
      case 1: rr = Math.max(0, rr - 1); break;
      case 2: cc = Math.min(6, cc + 1); break;
      default: cc = Math.max(0, cc - 1); break;
    }
  }
  const cells = [];
  let rMin=99,rMax=-99,cMin=99,cMax=-99;
  for (let r=0;r<7;r++) for(let c=0;c<7;c++) if(grid[r][c]!==0) {
    cells.push([r,c]); rMin=Math.min(rMin,r); rMax=Math.max(rMax,r); cMin=Math.min(cMin,c); cMax=Math.max(cMax,c);
  }
  const bw=cMax-cMin+1, bh=rMax-rMin+1;
  const cs = Math.floor(100/Math.max(bw,bh));
  const ox=(120-bw*cs)/2, oy=(120-bh*cs)/2;
  let rpic = (val & 127) ^ 64;
  const rR=rpic>>4, rG=(rpic>>2)&3, rB=rpic&3;
  let rcr=Math.round((rR+0.6)/4.8*255), rcg=Math.round((rG+0.8)/4.4*255), rcb=Math.round((rB+0.8)/4.4*255);
  if ((val & 255) > 127) { rcr=Math.floor(rcr*0.65); rcg=Math.floor(rcg*0.65); rcb=Math.floor(rcb*0.65); }
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,120,120);
  for (const [r,c] of cells) {
    const x=ox+(c-cMin)*cs, y=oy+(r-rMin)*cs;
    ctx.fillStyle='rgb('+rcr+','+rcg+','+rcb+')';
    ctx.fillRect(x,y,cs,cs);
    const m=cs*0.13;
    ctx.fillStyle='rgb('+Math.min(255,Math.round(rcr*1.2))+','+Math.min(255,Math.round(rcg*1.2))+','+Math.min(255,Math.round(rcb*1.2))+')';
    ctx.fillRect(x+m,y+m,cs-m*2,cs-m*2);
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; ctx.strokeRect(x,y,cs,cs);
  }
}
